# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: 3DV_Installer

on:
  push:
    branches: master

jobs:

  build:

    runs-on: windows-2022    # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      id: dotnet-setup
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    # windows-2022 runners ship a newer SDK preinstalled alongside whatever
    # setup-dotnet just added, and dotnet picks the highest installed SDK by
    # default - which fails to find Main for this project shape. Pin to the
    # EXACT version setup-dotnet just installed, with rollForward disabled,
    # so there is no "pick whatever's newest" ambiguity at all. CI-only, not
    # committed, so local dev isn't forced onto a specific SDK version.
    - name: Pin .NET SDK for this build
      run: |
        '{"sdk":{"version":"${{ steps.dotnet-setup.outputs.dotnet-version }}","rollForward":"disable"}}' | Set-Content -Path global.json

    # Run dotnet as a publish step so we can make single-file
    # publish has some new bug, so we need to use .csproj as target
    - name: Publish
      run: dotnet publish --output "./" --runtime win-x64 --configuration Release  -p:PublishSingleFile=true -p:PublishTrimmed=true --self-contained true 3DV_Installer.csproj

    # Unzip the NVidia 3D Vision Driver installer, so that it does not need to exist at launch.
    - name: Unzip 3DVision.exe
      run: 7z x .\NVidia\3DVision.Exe "-o.\3DVisionDriver" -y

    # Bundle the USB emitter driver alongside the 3D Vision driver, so it's
    # available to the installer at the same relative path at launch.
    - name: Copy USB emitter driver
      run: Copy-Item -Recurse -Force .\NVidia\NV3DVisionUSB.Driver .\3DVisionDriver\

    # Use 7z to zip up entire package for better compression.
    # '3DVisionDriver\' will take all items and keep folder name.
    # 'Extras\' will take both resource.dat and rcedit.exe and keep folder name.
    - name: 7z all
      run: 7z a .\3DV_Installer.7z 3DVisionDriver\ Extras\ .\3DV_installer.exe
      
    # Upload the package: https://github.com/marketplace/actions/upload-a-build-artifact
    # Grab the Tools and NVidia folders as needed components to make a full zip archive.
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        path: 3DV_Installer.7z
          
